<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Delivery System</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --text: #f8fafc; --vip: #f59e0b; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); }
        .navbar { display: flex; background: #020617; padding: 0 20px; border-bottom: 1px solid #334155; }
        .nav-btn { background: none; border: none; color: #94a3b8; padding: 20px; font-size: 16px; cursor: pointer; transition:0.2s;}
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: bold; }
        .view { display: none; padding: 40px; max-width: 1000px; margin: 0 auto; }
        .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--panel); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;}
        .category-header { border-bottom: 2px solid #334155; padding-bottom: 5px; color: #94a3b8; margin-top: 20px;}
        
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box;}
        button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        button:hover { filter: brightness(1.2); }
        .btn-green { background: #10b981; } .btn-vip { background: var(--vip); } .btn-danger { background: #ef4444; }
        .admin-form { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn" onclick="switchView('admin')">1. Admin: Manage</button>
        <button class="nav-btn active" onclick="switchView('user')">2. User: Order</button>
        <button class="nav-btn" onclick="switchView('driver')">3. Driver: Deliver</button>
    </div>

    <div id="admin" class="view">
        <h2>🛠️ Add New Food (Hash Map + Trie)</h2>
        <div class="card">
            <div class="admin-form">
                <input type="number" id="newId" placeholder="ID (e.g., 201)">
                <input type="text" id="newName" placeholder="Name">
                <input type="number" id="newPrice" placeholder="Price">
                <input type="text" id="newCat" placeholder="Category">
            </div>
            <button class="btn-green" style="width:100%" onclick="addNewFood()">+ Add to Menu</button>
        </div>

        <h2 style="margin-top: 40px;">🍳 Kitchen Queue (Priority Queue)</h2>
        <button class="btn-green" onclick="processAdmin()" style="margin-bottom: 15px;">Cook Next Order</button>
        <button class="btn-danger" onclick="undoAdmin()" style="margin-bottom: 15px; margin-left:10px;">↩ Undo Last (Stack)</button>
        <div id="adminQueueList"></div>

        <h2 style="margin-top: 40px;">📊 Popular Items (Order Counter)</h2>
        <button class="btn-green" onclick="loadPopularItems()" style="margin-bottom: 15px;">Refresh Stats</button>
        <div id="popularItemsList"></div>
    </div>

    <div id="user" class="view active">
        <h2>Menu</h2>
        <input type="text" id="searchBar" placeholder="Search menu... (Trie Algorithm)" onkeyup="loadMenu()">
        
        <div style="display: flex; gap: 40px;">
            <div id="menuContainer" style="flex: 2;"></div> 
            
            <div class="card" style="flex: 1; height: fit-content;">
                <h3>🛒 Cart (Linked List)</h3>
                <div id="cartList" style="margin-bottom: 20px;">Cart is empty.</div>
                
                <input type="text" id="userDest" placeholder="Enter Custom Delivery Address" required>
                
                <button style="width: 100%; margin-bottom:10px;" onclick="checkout(false)">Standard Checkout</button>
                <button class="btn-vip" style="width: 100%" onclick="checkout(true)">VIP Checkout (Priority)</button>
            </div>
        </div>
    </div>

    <div id="driver" class="view">
        <h2>🚗 Delivery Queue (FIFO)</h2>
        <div class="card">
            <h3 id="d-id">No active deliveries.</h3>
            <p id="d-items"></p>
            <p style="color:#f59e0b; font-weight:bold;" id="d-addr"></p>
            <div id="routeBox" style="margin: 20px 0; color: #10b981; font-family: monospace; font-size:16px;"></div>
            
            <button onclick="getRoute()">📍 Map Route to Customer (Dijkstra)</button>
            <button class="btn-green" onclick="completeDelivery()">✅ Confirm Delivered</button>
        </div>
    </div>

    <script>
        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            refreshAll();
        }

        function refreshAll() { loadMenu(); loadCart(); loadAdminQueue(); loadPopularItems(); loadDriver(); }

        // --- ADMIN ---
        async function addNewFood() {
            let id = document.getElementById('newId').value, name = document.getElementById('newName').value, price = document.getElementById('newPrice').value, cat = document.getElementById('newCat').value;
            if(!id || !name || !price || !cat) return alert("Fill all fields!");
            await fetch(`/api/menu/add?id=${id}&name=${name}&price=${price}&category=${cat}`);
            document.getElementById('newId').value = ""; document.getElementById('newName').value = "";
            switchView('user'); 
        }

        async function loadAdminQueue() {
            const res = await fetch('/api/admin/queue'); const data = await res.json();
            document.getElementById('adminQueueList').innerHTML = data.map(o => `<div class="card" style="border-left: 4px solid ${o.vip?'#f59e0b':'#3b82f6'}"><strong>Order #${o.id}</strong> ${o.vip?'<span style="color:#f59e0b">(VIP)</span>':''}<br>${o.items}</div>`).join('');
        }
        async function processAdmin() { await fetch('/api/admin/process'); loadAdminQueue(); }
        async function undoAdmin() { await fetch('/api/admin/undo'); loadAdminQueue(); }

        async function loadPopularItems() {
            const res = await fetch('/api/analytics/popular?limit=10');
            const data = await res.json();
            let html = "<div class='grid'>";
            if(data.length === 0) {
                html += "<div class='card'><p style='color:#94a3b8;'>No items ordered yet.</p></div>";
            } else {
                data.forEach(item => {
                    html += `<div class="card" style="margin-bottom:0;"><h4>${item.item}</h4><p style="color:#10b981; margin:0;">Ordered ${item.count} time${item.count !== 1 ? 's' : ''}</p></div>`;
                });
            }
            html += "</div>";
            document.getElementById('popularItemsList').innerHTML = html;
        }

        // --- USER ---
        async function loadMenu() {
            let q = document.getElementById('searchBar').value;
            const res = await fetch(`/api/menu?q=${q}`); const categories = await res.json();
            let html = "";
            for (const [category, items] of Object.entries(categories)) {
                html += `<h3 class="category-header">${category}</h3><div class="grid">`;
                items.forEach(i => {
                    html += `<div class="card" style="margin-bottom:0;"><small style="color:#94a3b8">ID: ${i.id}</small><h4 style="margin:5px 0;">${i.name}</h4><p style="color:#10b981; margin:0 0 10px 0;">Rs. ${i.price}</p><button onclick="addToCart('${i.name}', ${i.price})">Add to Cart</button></div>`;
                });
                html += `</div>`;
            }
            document.getElementById('menuContainer').innerHTML = html || "No items found.";
        }

        async function addToCart(item, price) { await fetch(`/api/cart/add?item=${item}&price=${price}`); loadCart(); }
        async function loadCart() {
            const res = await fetch('/api/cart/view'); const data = await res.json();
            let html = ""; let total = 0;
            data.forEach(i => { html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.item}</span><span>Rs. ${i.price}</span></div>`; total += i.price; });
            document.getElementById('cartList').innerHTML = html ? html + `<hr><h4 style="text-align:right; margin:0;">Total: Rs. ${total}</h4>` : "Cart is empty.";
        }
        
        async function checkout(isVIP) { 
            let address = document.getElementById('userDest').value;
            if(!address) return alert("Please enter a custom delivery address!");
            await fetch(`/api/checkout?vip=${isVIP}&address=${encodeURIComponent(address)}`); 
            alert("Sent to Kitchen!"); loadCart(); 
        }

        // --- DRIVER ---
        let currentDriverAddress = "";
        async function loadDriver() {
            const res = await fetch('/api/driver/queue'); const data = await res.json();
            if(data.id) {
                document.getElementById('d-id').innerText = "Deliver Order #" + data.id;
                document.getElementById('d-items').innerText = "Items: " + data.items;
                document.getElementById('d-addr').innerText = "Destination: " + data.address;
                currentDriverAddress = data.address;
            } else { 
                document.getElementById('d-id').innerText = "No active deliveries."; 
                document.getElementById('d-items').innerText = ""; 
                document.getElementById('d-addr').innerText = ""; 
                document.getElementById('routeBox').innerHTML = ""; 
                currentDriverAddress = "";
            }
        }
        async function getRoute() {
            if(!currentDriverAddress) return;
            const res = await fetch(`/api/route?dest=${encodeURIComponent(currentDriverAddress)}`); const data = await res.json();
            document.getElementById('routeBox').innerHTML = `Optimal Path:<br>🚀 ${data.path} 🏁<br>Total Distance: ${data.distance} km`;
        }
        async function completeDelivery() { await fetch('/api/driver/deliver'); loadDriver(); document.getElementById('routeBox').innerHTML = ""; }

        refreshAll();
        setInterval(refreshAll, 2000); 
    </script>
</body>
</html>
