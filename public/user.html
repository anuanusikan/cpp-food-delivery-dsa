<!DOCTYPE html>
<html><head><title>User Interface</title>
<style>body{background:#121212;color:white;font-family:sans-serif;padding:20px;}
.card{background:#1e1e1e;padding:15px;margin:10px 0;border-radius:5px;}
input, button{padding:10px;margin:5px 0;} button{background:#4CAF50;color:white;border:none;cursor:pointer;}
#auth{display:block;} #app{display:none;}
</style></head><body>

    <div id="auth">
        <h2>User Login</h2>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="login()">Login</button>
    </div>

    <div id="app">
        <h2 id="welcomeText"></h2> <button onclick="logout()">Logout</button>
        <hr>
        <h3>Search & Order</h3>
        <input type="text" id="search" placeholder="Search food..." onkeyup="filterMenu()">
        <input type="text" id="address" placeholder="Delivery Address (e.g., User_House, Office)" value="User_House">
        <div id="menu"></div>
        <hr>
        <h3>My Orders</h3>
        <button onclick="loadMyOrders()">Refresh Status</button>
        <div id="my-orders"></div>
    </div>

    <script>
        let user = "";
        function login() { user = document.getElementById('username').value; if(user){ document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; document.getElementById('welcomeText').innerText = "Welcome, " + user; loadMenu(); loadMyOrders(); } }
        function logout() { user = ""; document.getElementById('auth').style.display='block'; document.getElementById('app').style.display='none'; }

        async function loadMenu() {
            const res = await fetch('/api/menu'); const data = await res.json();
            document.getElementById('menu').innerHTML = data.map(i => `<div class="card menuItem"><h4>${i.name}</h4><p>Rs. ${i.price}</p><button onclick="order('${i.name}')">Order Normal</button> <button style="background:orange;" onclick="order('${i.name}', true)">Order VIP</button></div>`).join('');
        }

        function filterMenu() {
            let q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.menuItem').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }

        async function order(item, isVIP=false) {
            let addr = document.getElementById('address').value;
            await fetch(`/api/order/place?user=${user}&item=${item}&address=${addr}&vip=${isVIP}`);
            alert("Order placed!"); loadMyOrders();
        }

        async function loadMyOrders() {
            const res = await fetch(`/api/order/user?user=${user}`); const data = await res.json();
            document.getElementById('my-orders').innerHTML = data.map(o => {
                let html = `<div class="card">Order #${o.id}: ${o.item} - <strong>${o.status}</strong>`;
                if(o.status === 'Pending') html += ` <button style="background:red" onclick="cancel(${o.id})">Cancel</button>`;
                if(o.status === 'Delivered') html += ` <input type='text' id='r${o.id}' placeholder='Review'> <button onclick="review(${o.id})">Submit</button>`;
                return html + `</div>`;
            }).join('');
        }

        async function cancel(id) { await fetch(`/api/order/cancel?id=${id}`); loadMyOrders(); }
        async function review(id) { let txt = document.getElementById(`r${id}`).value; await fetch(`/api/order/review?id=${id}&review=${txt}`); alert("Review added!"); }
    </script>
</body></html>
