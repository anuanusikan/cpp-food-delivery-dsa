<!DOCTYPE html>
<html><head><title>Driver Interface</title>
<style>body{background:#121212;color:white;font-family:sans-serif;padding:20px;}
.card{background:#0f3460;padding:20px;border-radius:5px;}
button{padding:10px;background:#e94560;color:white;border:none;cursor:pointer;}
</style></head><body>

    <h2>Delivery Dashboard</h2>
    <button onclick="loadNextDelivery()">Check for Deliveries</button>
    
    <div id="active-delivery" class="card" style="display:none; margin-top:20px;">
        <h3 id="d-item"></h3>
        <p><strong>Deliver To:</strong> <span id="d-addr"></span></p>
        <button style="background:#2196F3;" onclick="getRoute()">Get GPS Route</button>
        <div id="route-info" style="margin:15px 0; color:orange;"></div>
        <button onclick="confirmDelivery()">Confirm Delivered</button>
    </div>

    <script>
        let currentAddr = "";
        async function loadNextDelivery() {
            const res = await fetch('/api/driver/queue'); const data = await res.json();
            if(data.id) {
                document.getElementById('active-delivery').style.display = 'block';
                document.getElementById('d-item').innerText = "Order #" + data.id + ": " + data.item;
                document.getElementById('d-addr').innerText = data.address;
                currentAddr = data.address;
                document.getElementById('route-info').innerText = "";
            } else { alert("No deliveries right now."); document.getElementById('active-delivery').style.display = 'none'; }
        }
        async function getRoute() {
            const res = await fetch(`/api/route?dest=${currentAddr}`); const data = await res.json();
            document.getElementById('route-info').innerHTML = `Distance: ${data.distance} km<br>Path: ${data.path.join(" ➔ ")}`;
        }
        async function confirmDelivery() { await fetch('/api/driver/confirm'); loadNextDelivery(); }
    </script>
</body></html>
