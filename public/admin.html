<!DOCTYPE html>
<html><head><title>Admin Interface</title>
<style>body{background:#121212;color:white;font-family:sans-serif;padding:20px;}
.card{background:#1e1e1e;padding:15px;margin:10px 0;border-left:4px solid #2196F3;}
input, button{padding:10px;} button{background:#2196F3;color:white;border:none;cursor:pointer;}
</style></head><body>

    <h2>Admin: Add Food</h2>
    <input type="text" id="fName" placeholder="Food Name">
    <input type="number" id="fPrice" placeholder="Price">
    <button onclick="addFood()">Add to System</button>
    
    <hr>
    <h2>Admin: Order Queue (Priority)</h2>
    <button onclick="loadQueue()">Refresh Queue</button>
    <button style="background:#4CAF50;" onclick="processOrder()">Cook Next Item</button>
    <div id="queue"></div>

    <script>
        async function addFood() {
            let n = document.getElementById('fName').value; let p = document.getElementById('fPrice').value;
            await fetch(`/api/menu/add?name=${n}&price=${p}`); alert("Added to system!");
        }
        async function loadQueue() {
            const res = await fetch('/api/admin/queue'); const data = await res.json();
            document.getElementById('queue').innerHTML = data.map(o => `<div class="card" ${o.vip?'style="border-color:orange;"':''}>#${o.id} - ${o.item} ${o.vip?'(VIP)':''}</div>`).join('');
        }
        async function processOrder() { await fetch('/api/admin/process'); loadQueue(); }
        setInterval(loadQueue, 5000); // Auto refresh
    </script>
</body></html>
